<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep green background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a4d2e"/>
      <stop offset="100%" stop-color="#0d2216"/>
    </linearGradient>
    <!-- Gold gradient for the mark -->
    <linearGradient id="gold" x1="200" y1="100" x2="312" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5DE95"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#997A15"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border ring -->
  <rect x="22" y="22" width="468" height="468" rx="92" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.25"/>

  <!-- Fork / Crown tines at apex of A -->
  <rect x="242" y="106" width="6" height="30" rx="3" fill="url(#gold)"/>
  <rect x="253" y="96"  width="6" height="40" rx="3" fill="url(#gold)"/>
  <rect x="264" y="106" width="6" height="30" rx="3" fill="url(#gold)"/>

  <!-- Bold geometric "A" letterform -->
  <path d="
    M150 390
    L244 136
    L268 136
    L362 390
    L332 390
    L294 280
    L218 280
    L180 390
    Z
  " fill="url(#gold)"/>

  <!-- Triangle counter (hole in the A) -->
  <path d="
    M238 258
    L274 258
    L256 196
    Z
  " fill="url(#bg)"/>

  <!-- Subtle plate arc beneath the A -->
  <path d="M155 408 Q256 438 357 408" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.2"/>
</svg>
