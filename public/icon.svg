<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E5631" />
      <stop offset="100%" stop-color="#0f2b19" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5DE95" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#997A15" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield/Circle -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#goldGradient)" stroke-width="4" opacity="0.6" />

  <!-- Universal Fork, Knife & Cloche Culinary Motif -->
  <g filter="url(#glow)">
    <!-- Left Fork -->
    <path d="M156 140v100c0 15 10 25 24 25h4v75h-16v24h44v-99h4c14 0 24-10 24-25V140H156zm12 20h24v70h-24v-70z" fill="url(#goldGradient)" />

    <!-- Right Knife -->
    <path d="M312 140c-12 0-22 10-22 22v103h16v62h28v-165c0-12-10-20-22-20z" fill="url(#goldGradient)" />

    <!-- Central Crown / Cloche Arc -->
    <path d="M220 220c0-20 16-36 36-36s36 16 36 36v18H220v-18z" fill="url(#goldGradient)" />
    <path d="M190 268h132c12 0 22 10 22 22v12H168v-12c0-12 10-22 22-22z" fill="url(#goldGradient)" />
  </g>

  <!-- Modern Typography Badge "AGNES" -->
  <text x="256" y="420" font-family="'Playfair Display', serif" font-size="56" font-weight="700" fill="url(#goldGradient)" letter-spacing="12" text-anchor="middle">AGNES</text>
  <text x="256" y="445" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" letter-spacing="6" opacity="0.8" text-anchor="middle">MODERN HERITAGE DINING</text>
</svg>
